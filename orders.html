
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>My Orders | ShopEase</title>

  <link
    rel="stylesheet"
    href="styles.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.orders-page{

  max-width:1200px;

  margin:auto;

  padding:20px;

}


.site-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  flex-wrap:wrap;

  gap:20px;

}


.logo{

  margin:0;

}


.nav{

  display:flex;

  gap:15px;

  align-items:center;

  flex-wrap:wrap;

}


.nav a{

  text-decoration:none;

  color:#111827;

  font-weight:600;

}


.logout-btn{

  background:#ef4444;

  color:white;

  border:none;

  padding:10px 16px;

  border-radius:10px;

  cursor:pointer;

  font-weight:600;

}


.page-title{

  margin-top:40px;

  font-size:38px;

  font-weight:700;

  color:#111827;

}


.orders-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:25px;

  margin-top:30px;

}


.order-card{

  background:white;

  border-radius:20px;

  overflow:hidden;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);

}


.order-image{

  width:100%;

  height:220px;

  object-fit:cover;

}


.order-content{

  padding:20px;

}


.order-title{

  font-size:22px;

  font-weight:700;

  margin-bottom:10px;

}


.order-detail{

  margin-bottom:10px;

  color:#374151;

}


.order-status{

  display:inline-block;

  padding:8px 14px;

  border-radius:12px;

  font-size:14px;

  font-weight:700;

  margin-top:10px;

  color:white;

}


.pending{

  background:#f59e0b;

}


.packed{

  background:#3b82f6;

}


.shipped{

  background:#6366f1;

}


.delivery{

  background:#0ea5e9;

}


.delivered{

  background:#10b981;

}


.tracking-box{

  margin-top:15px;

  background:#f3f4f6;

  padding:15px;

  border-radius:12px;

}


.empty-orders{

  text-align:center;

  background:white;

  padding:50px;

  border-radius:24px;

  margin-top:40px;

}


.loading{

  text-align:center;

  padding:40px;

}

</style>

</head>

<body>

<div class="orders-page">

<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase
    </h1>

    <div
      style="font-size:13px;color:#6b7280"
    >
      Track Your Orders
    </div>

  </div>

  <nav class="nav" id="navbar">

    <a href="index.html">
      Home
    </a>

    <a href="products.html">
      Products
    </a>

    <a href="cart.html">
      Cart
    </a>

    <a href="profile.html">
      Profile
    </a>

  </nav>

</header>

<h1 class="page-title">
  My Orders
</h1>

<div
  class="orders-grid"
  id="ordersGrid"
>

  <div class="loading">
    Loading orders...
  </div>

</div>

</div>

<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




// LOGIN CHECK
if(!user){

  window.location.href =
    'login.html';

}










// GET PROFILE
const {
  data: profile
} = await supabase
  .from('profiles')
  .select('*')
  .eq('id', user.id)
  .single();










// NAVBAR
const navbar =
document.getElementById(
  'navbar'
);




// SELLER
if(profile.role === 'seller'){

  navbar.innerHTML += `

    <a href="seller-dashboard.html">

      Seller Dashboard

    </a>

  `;

}










// ADMIN
if(profile.role === 'admin'){

  navbar.innerHTML += `

    <a href="admin-dashboard.html">

      Admin Panel

    </a>

  `;

}










// LOGOUT
navbar.innerHTML += `

  <button
    id="logoutBtn"
    class="logout-btn"
  >

    Logout

  </button>

`;










// LOGOUT ACTION
document
.getElementById('logoutBtn')
.addEventListener('click',

async ()=>{

  await supabase.auth.signOut();




  window.location.href =
    'login.html';

});










// STATUS CLASS
function getStatusClass(status){

  if(status === 'Pending'){

    return 'pending';

  }

  if(status === 'Packed'){

    return 'packed';

  }

  if(status === 'Shipped'){

    return 'shipped';

  }

  if(status === 'Out For Delivery'){

    return 'delivery';

  }

  if(status === 'Delivered'){

    return 'delivered';

  }

  return 'pending';

}










// LOAD ORDERS
async function loadOrders(){

  const {
    data: orders,
    error
  } = await supabase
    .from('orders')
    .select('*')
    .eq('customer_id', user.id)
    .order('created_at', {

      ascending:false

    });




  if(error){

    console.log(error);

    return;

  }






  const grid =
    document.getElementById(
      'ordersGrid'
    );




  grid.innerHTML = '';






  // EMPTY
  if(orders.length === 0){

    grid.innerHTML = `

      <div class="empty-orders">

        <h2>
          No Orders Yet
        </h2>

        <p>
          Start shopping now
        </p>

      </div>

    `;

    return;

  }










  // DISPLAY ORDERS
  orders.forEach(order => {

    grid.innerHTML += `

      <div class="order-card">

        <img
          src="${order.product_image}"
          class="order-image"
        >

        <div class="order-content">

          <div class="order-title">

            ${order.product_title}

          </div>










          <div class="order-detail">

            Quantity:
            ${order.quantity}

          </div>










          <div class="order-detail">

            Total:
            ₹${order.total}

          </div>










          <div class="order-detail">

            Payment:
            ${order.payment_method || 'COD'}

          </div>










          <div class="order-detail">

            Address:
            ${order.customer_address}

          </div>










          <div
            class="
              order-status
              ${getStatusClass(order.status)}
            "
          >

            ${order.status}

          </div>










          <div class="tracking-box">

            ${order.tracking_message}

          </div>

        </div>

      </div>

    `;

  });

}


loadOrders();










// REALTIME ORDER TRACKING
supabase
.channel('orders-live')

.on(

  'postgres_changes',

  {

    event:'*',

    schema:'public',

    table:'orders'

  },

  ()=>{

    loadOrders();

  }

)

.subscribe();

</script>

</body>
</html>
