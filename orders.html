
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Orders | ShopEase</title>


  <link
    rel="stylesheet"
    href="styles.css"
  >


  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >



<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.orders-page{

  max-width:1200px;

  margin:auto;

  padding:20px;

}


.orders-title{

  font-size:38px;

  font-weight:700;

  color:#111827;

  margin:30px 0;

}


.orders-container{

  display:flex;

  flex-direction:column;

  gap:25px;

}


.order-card{

  background:white;

  border-radius:24px;

  padding:30px;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.order-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  flex-wrap:wrap;

  gap:15px;

  margin-bottom:25px;

}


.order-id{

  font-size:20px;

  font-weight:700;

  color:#111827;

}


.order-date{

  color:#6b7280;

}


.order-status{

  background:#10b981;

  color:white;

  padding:8px 16px;

  border-radius:12px;

  font-size:14px;

  font-weight:600;

}


.order-products{

  margin-top:20px;

}


.order-product{

  display:flex;

  align-items:center;

  gap:20px;

  margin-bottom:20px;

  padding-bottom:20px;

  border-bottom:1px solid #e5e7eb;

}


.order-product:last-child{

  border-bottom:none;

  margin-bottom:0;

  padding-bottom:0;

}


.order-product img{

  width:100px;

  height:100px;

  object-fit:cover;

  border-radius:16px;

}


.product-details{

  flex:1;

}


.product-title{

  font-size:18px;

  font-weight:600;

  color:#111827;

  margin-bottom:8px;

}


.product-price{

  color:#0ea5e9;

  font-size:16px;

  font-weight:700;

}


.product-qty{

  color:#6b7280;

  margin-top:5px;

}


.order-total{

  margin-top:25px;

  text-align:right;

  font-size:24px;

  font-weight:700;

  color:#111827;

}


.empty-orders{

  background:white;

  border-radius:24px;

  padding:60px;

  text-align:center;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.empty-orders h2{

  color:#111827;

}


.shop-btn{

  display:inline-block;

  margin-top:20px;

  background:#0ea5e9;

  color:white;

  text-decoration:none;

  padding:14px 24px;

  border-radius:14px;

  font-weight:700;

}


.loading{

  text-align:center;

  padding:60px;

  font-size:22px;

  color:#6b7280;

}


@media(max-width:768px){

  .order-product{

    flex-direction:column;

    align-items:flex-start;

  }


  .order-product img{

    width:100%;

    height:220px;

  }

}

</style>

</head>

<body>





<div class="orders-page">





<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase
    </h1>

    <div
      class="muted"
      style="font-size:13px"
    >
      Your Orders
    </div>

  </div>



  <nav class="nav">

    <a href="index.html">
      Home
    </a>

    <a href="products.html">
      Products
    </a>

    <a href="orders.html">
      Orders
    </a>

    <a href="cart.html">
      Cart
    </a>

    <a href="profile.html">
      Profile
    </a>

  </nav>

</header>








<h1 class="orders-title">

  My Orders

</h1>






<div
  class="orders-container"
  id="ordersContainer"
>

  <div class="loading">

    Loading orders...

  </div>

</div>







<footer class="site-footer">

  <div>
    &copy; 2025 ShopEase.
    All rights reserved.
  </div>

</footer>

</div>








<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




// CHECK LOGIN
if(!user){

  window.location.href =
    'login.html';

}








// LOAD ORDERS
async function loadOrders(){

  const {
    data,
    error
  } = await supabase
    .from('orders')
    .select('*')
    .eq('user_id', user.id)
    .order('created_at', {

      ascending:false

    });




  if(error){

    console.log(error);

    return;

  }




  const container =
    document.getElementById(
      'ordersContainer'
    );




  // EMPTY
  if(!data || data.length === 0){

    container.innerHTML = `

      <div class="empty-orders">

        <h2>
          No orders found
        </h2>

        <p>
          Start shopping now
        </p>

        <a
          href="products.html"
          class="shop-btn"
        >

          Shop Products

        </a>

      </div>

    `;

    return;

  }




  container.innerHTML = '';




  // SHOW ORDERS
  data.forEach(order => {

    container.innerHTML += `

      <div class="order-card">




        <div class="order-header">

          <div>

            <div class="order-id">

              Order #${order.id}

            </div>



            <div class="order-date">

              ${new Date(
                order.created_at
              ).toLocaleString()}

            </div>

          </div>




          <div class="order-status">

            ${order.status || 'Pending'}

          </div>

        </div>







        <div class="order-products">

          ${order.items.map(item => `

            <div class="order-product">

              <img
                src="${item.image}"
              >




              <div class="product-details">

                <div class="product-title">

                  ${item.title}

                </div>




                <div class="product-price">

                  ₹${item.price}

                </div>




                <div class="product-qty">

                  Quantity:
                  ${item.qty}

                </div>

              </div>

            </div>

          `).join('')}

        </div>








        <div class="order-total">

          Total:
          ₹${order.total}

        </div>

      </div>

    `;

  });

}


loadOrders();

</script>


</body>
</html>
