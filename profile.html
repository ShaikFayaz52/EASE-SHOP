
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Profile | ShopEase</title>


  <link
    rel="stylesheet"
    href="styles.css"
  >


  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >



<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.profile-page{

  max-width:900px;

  margin:40px auto;

  padding:20px;

}


.profile-card{

  background:white;

  border-radius:24px;

  padding:40px;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.profile-header{

  display:flex;

  align-items:center;

  gap:20px;

  margin-bottom:30px;

}


.profile-avatar{

  width:90px;

  height:90px;

  border-radius:50%;

  background:#0ea5e9;

  display:flex;

  align-items:center;

  justify-content:center;

  color:white;

  font-size:36px;

  font-weight:700;

}


.profile-info h2{

  margin:0;

  color:#111827;

}


.profile-info p{

  margin-top:8px;

  color:#6b7280;

}


.form-group{

  margin-bottom:22px;

}


.form-group label{

  display:block;

  margin-bottom:8px;

  font-weight:600;

  color:#374151;

}


.form-group input,

.form-group textarea{

  width:100%;

  padding:14px;

  border:1px solid #d1d5db;

  border-radius:14px;

  font-size:15px;

  outline:none;

}


.form-group textarea{

  resize:none;

  height:100px;

}


.form-group input:focus,

.form-group textarea:focus{

  border-color:#0ea5e9;

}


.button-group{

  display:flex;

  gap:15px;

  margin-top:30px;

  flex-wrap:wrap;

}


.save-btn{

  background:#10b981;

  color:white;

  border:none;

  padding:14px 22px;

  border-radius:14px;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

}


.logout-btn{

  background:#ef4444;

  color:white;

  border:none;

  padding:14px 22px;

  border-radius:14px;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

}


.save-btn:hover,
.logout-btn:hover{

  opacity:0.9;

}


.loading{

  text-align:center;

  padding:60px;

}


@media(max-width:768px){

  .profile-card{

    padding:25px;

  }


  .profile-header{

    flex-direction:column;

    text-align:center;

  }

}

</style>

</head>

<body>





<div class="profile-page">




<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase
    </h1>

    <div
      class="muted"
      style="font-size:13px"
    >
      User Profile
    </div>

  </div>



  <nav class="nav">

    <a href="index.html">
      Home
    </a>

    <a href="products.html">
      Products
    </a>

    <a href="orders.html">
      Orders
    </a>

    <a href="cart.html">
      Cart
    </a>

    <a href="profile.html">
      Profile
    </a>

  </nav>

</header>







<div class="profile-card">




<div class="profile-header">

  <div
    class="profile-avatar"
    id="avatarLetter"
  >
    U
  </div>



  <div class="profile-info">

    <h2 id="profileName">
      Loading...
    </h2>

    <p id="profileEmail">
      loading@email.com
    </p>

  </div>

</div>







<form id="profileForm">



  <div class="form-group">

    <label>
      Full Name
    </label>

    <input
      type="text"
      id="name"
      placeholder="Enter your full name"
    >

  </div>





  <div class="form-group">

    <label>
      Email Address
    </label>

    <input
      type="email"
      id="email"
      placeholder="Enter your email"
    >

  </div>





  <div class="form-group">

    <label>
      Phone Number
    </label>

    <input
      type="text"
      id="phone"
      placeholder="Enter your phone number"
    >

  </div>





  <div class="form-group">

    <label>
      Address
    </label>

    <textarea
      id="address"
      placeholder="Enter your address"
    ></textarea>

  </div>





  <div class="button-group">

    <button
      type="submit"
      class="save-btn"
    >

      Save Profile

    </button>





    <button
      type="button"
      class="logout-btn"
      id="logoutBtn"
    >

      Logout

    </button>

  </div>

</form>

</div>






<footer class="site-footer">

  <div>
    &copy; 2025 ShopEase.
    All rights reserved.
  </div>

</footer>

</div>







<script type="module">

import { supabase }
from './supabase.js';




// GET CURRENT USER
const {
  data: { user }
} = await supabase.auth.getUser();




// CHECK LOGIN
if(!user){

  window.location.href =
    'login.html';

}




// SET USER INFO
document.getElementById(
  'profileEmail'
).innerText = user.email;





// LOAD PROFILE
async function loadProfile(){

  const {
    data,
    error
  } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();




  if(data){

    document.getElementById('name')
    .value = data.name || '';



    document.getElementById('email')
    .value = data.email || '';



    document.getElementById('phone')
    .value = data.phone || '';



    document.getElementById('address')
    .value = data.address || '';




    document.getElementById(
      'profileName'
    ).innerText =

      data.name || 'User';




    // AVATAR LETTER
    if(data.name){

      document.getElementById(
        'avatarLetter'
      ).innerText =

        data.name
        .charAt(0)
        .toUpperCase();

    }

  }

}


loadProfile();







// SAVE PROFILE
document
.getElementById('profileForm')
.addEventListener('submit',

async (e)=>{

  e.preventDefault();




  const profileData = {

    id:user.id,

    name:
      document.getElementById(
        'name'
      ).value,

    email:
      document.getElementById(
        'email'
      ).value,

    phone:
      document.getElementById(
        'phone'
      ).value,

    address:
      document.getElementById(
        'address'
      ).value

  };




  const {
    error
  } = await supabase
    .from('profiles')
    .upsert(profileData);




  if(error){

    alert(error.message);

    return;

  }




  alert(
    'Profile updated successfully'
  );




  loadProfile();

});








// LOGOUT
document
.getElementById('logoutBtn')
.addEventListener('click',

async ()=>{

  await supabase.auth.signOut();

  window.location.href =
    'login.html';

});

</script>


<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




if(user){

  // GET PROFILE
  const {
    data: profile
  } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();




  const nav =
    document.querySelector('.nav');






  // SELLER
  if(profile.role === 'seller'){

    nav.innerHTML += `

      <a href="seller-dashboard.html">

        Seller Dashboard

      </a>

    `;

  }






  // ADMIN
  if(profile.role === 'admin'){

    nav.innerHTML += `

      <a href="admin-dashboard.html">

        Admin Panel

      </a>

    `;

  }






  // LOGOUT BUTTON
  nav.innerHTML += `

    <button
      id="logoutBtn"
      style="
        background:#ef4444;
        color:white;
        border:none;
        padding:8px 14px;
        border-radius:10px;
        cursor:pointer;
      "
    >

      Logout

    </button>

  `;






  // LOGOUT
  document
  .getElementById('logoutBtn')
  .addEventListener('click',

  async ()=>{

    await supabase.auth.signOut();




    window.location.href =
      'login.html';

  });

}

</script>

</body>
</html>
