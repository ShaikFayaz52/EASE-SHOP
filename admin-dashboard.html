
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Dashboard | ShopEase</title>


  <link
    rel="stylesheet"
    href="styles.css"
  >


  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >



<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.dashboard{

  max-width:1400px;

  margin:auto;

  padding:20px;

}


.dashboard-title{

  font-size:40px;

  font-weight:700;

  margin:30px 0;

  color:#111827;

}


.stats-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-bottom:40px;

}


.stat-card{

  background:white;

  padding:25px;

  border-radius:24px;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.stat-card h3{

  margin:0;

  color:#6b7280;

  font-size:16px;

}


.stat-card p{

  margin-top:15px;

  font-size:34px;

  font-weight:700;

  color:#111827;

}


.section{

  margin-top:40px;

}


.section-title{

  font-size:30px;

  font-weight:700;

  margin-bottom:25px;

  color:#111827;

}


.table-container{

  background:white;

  border-radius:24px;

  overflow:auto;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


table{

  width:100%;

  border-collapse:collapse;

}


th,
td{

  padding:18px;

  text-align:left;

  border-bottom:1px solid #e5e7eb;

}


th{

  background:#f9fafb;

  color:#374151;

}


.action-btn{

  border:none;

  padding:10px 16px;

  border-radius:10px;

  font-weight:600;

  cursor:pointer;

}


.delete-btn{

  background:#ef4444;

  color:white;

}


.ban-btn{

  background:#f59e0b;

  color:white;

}


.status{

  background:#10b981;

  color:white;

  padding:6px 12px;

  border-radius:10px;

  font-size:14px;

}


</style>

</head>

<body>





<div class="dashboard">





<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase Admin
    </h1>

    <div
      class="muted"
      style="font-size:13px"
    >
      Platform Control Panel
    </div>

  </div>



  <nav class="nav">

    <a href="index.html">
      Store
    </a>

    <a href="profile.html">
      Profile
    </a>
<button id="logoutBtn" class="logout-btn" > Logout </button>
  </nav>

</header>








<h1 class="dashboard-title">

  Admin Dashboard

</h1>








<div class="stats-grid">

  <div class="stat-card">

    <h3>
      Total Users
    </h3>

    <p id="totalUsers">
      0
    </p>

  </div>





  <div class="stat-card">

    <h3>
      Total Sellers
    </h3>

    <p id="totalSellers">
      0
    </p>

  </div>





  <div class="stat-card">

    <h3>
      Total Products
    </h3>

    <p id="totalProducts">
      0
    </p>

  </div>





  <div class="stat-card">

    <h3>
      Total Orders
    </h3>

    <p id="totalOrders">
      0
    </p>

  </div>

</div>









<div class="section">

  <div class="section-title">

    Users & Sellers

  </div>






  <div class="table-container">

    <table>

      <thead>

        <tr>

          <th>
            Name
          </th>

          <th>
            Email
          </th>

          <th>
            Role
          </th>

          <th>
            Status
          </th>

          <th>
            Action
          </th>

        </tr>

      </thead>






      <tbody id="usersTable">

      </tbody>

    </table>

  </div>

</div>









<div class="section">

  <div class="section-title">

    Products

  </div>






  <div class="table-container">

    <table>

      <thead>

        <tr>

          <th>
            Product
          </th>

          <th>
            Price
          </th>

          <th>
            Category
          </th>

          <th>
            Action
          </th>

        </tr>

      </thead>






      <tbody id="productsTable">

      </tbody>

    </table>

  </div>

</div>









<div class="section">

  <div class="section-title">

    Orders

  </div>






  <div class="table-container">

    <table>

      <thead>

        <tr>

          <th>
            Order ID
          </th>

          <th>
            Customer
          </th>

          <th>
            Total
          </th>

          <th>
            Status
          </th>

        </tr>

      </thead>






      <tbody id="ordersTable">

      </tbody>

    </table>

  </div>

</div>

</div>









<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




// CHECK LOGIN
if(!user){

  window.location.href =
    'login.html';

}




// CHECK ADMIN
const {
  data: profile
} = await supabase
  .from('profiles')
  .select('*')
  .eq('id', user.id)
  .single();




if(profile.role !== 'admin'){

  alert('Admin access only');

  window.location.href =
    'index.html';

}










// LOAD DASHBOARD
async function loadDashboard(){




  // USERS
  const {
    data: users
  } = await supabase
    .from('profiles')
    .select('*');




  // PRODUCTS
  const {
    data: products
  } = await supabase
    .from('products')
    .select('*');




  // ORDERS
  const {
    data: orders
  } = await supabase
    .from('orders')
    .select('*');




  // STATS
  document.getElementById(
    'totalUsers'
  ).innerText = users.length;




  document.getElementById(
    'totalSellers'
  ).innerText =

    users.filter(
      u => u.role === 'seller'
    ).length;




  document.getElementById(
    'totalProducts'
  ).innerText = products.length;




  document.getElementById(
    'totalOrders'
  ).innerText = orders.length;








  // USERS TABLE
  const usersTable =
    document.getElementById(
      'usersTable'
    );




  usersTable.innerHTML = '';




  users.forEach(u => {

    usersTable.innerHTML += `

      <tr>

        <td>
          ${u.name || 'No Name'}
        </td>




        <td>
          ${u.email}
        </td>




        <td>
          ${u.role}
        </td>




        <td>

          <span class="status">

            ${u.banned ? 'Banned' : 'Active'}

          </span>

        </td>




        <td>

          <button
            class="action-btn ban-btn"
            onclick="toggleBan('${u.id}', ${u.banned})"
          >

            ${u.banned ? 'Unban' : 'Ban'}

          </button>

        </td>

      </tr>

    `;

  });








  // PRODUCTS TABLE
  const productsTable =
    document.getElementById(
      'productsTable'
    );




  productsTable.innerHTML = '';




  products.forEach(p => {

    productsTable.innerHTML += `

      <tr>

        <td>
          ${p.title}
        </td>




        <td>
          ₹${p.price}
        </td>




        <td>
          ${p.category}
        </td>




        <td>

          <button
            class="action-btn delete-btn"
            onclick="deleteProduct('${p.id}')"
          >

            Delete

          </button>

        </td>

      </tr>

    `;

  });








  // ORDERS TABLE
  const ordersTable =
    document.getElementById(
      'ordersTable'
    );




  ordersTable.innerHTML = '';




  orders.forEach(o => {

    ordersTable.innerHTML += `

      <tr>

        <td>
          #${o.id}
        </td>




        <td>
          ${o.customer_name}
        </td>




        <td>
          ₹${o.total}
        </td>




        <td>

          <span class="status">

            ${o.status}

          </span>

        </td>

      </tr>

    `;

  });

}


loadDashboard();










// BAN / UNBAN USER
window.toggleBan =
async function(id, banned){

  await supabase
    .from('profiles')
    .update({

      banned: !banned

    })
    .eq('id', id);




  loadDashboard();

};










// DELETE PRODUCT
window.deleteProduct =
async function(id){

  const confirmDelete =
    confirm(
      'Delete this product?'
    );




  if(!confirmDelete) return;




  await supabase
    .from('products')
    .delete()
    .eq('id', id);




  loadDashboard();

};

// LOGOUT
document
.getElementById('logoutBtn')
.addEventListener('click',

async ()=>{

  await supabase.auth.signOut();




  window.location.href =
    'login.html';

});


</script>


</body>
</html>
