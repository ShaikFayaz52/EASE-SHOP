
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Seller Dashboard | ShopEase</title>

  <link
    rel="stylesheet"
    href="styles.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.dashboard{

  max-width:1300px;

  margin:auto;

  padding:20px;

}


.site-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  flex-wrap:wrap;

  gap:20px;

}


.logo{

  margin:0;

}


.nav{

  display:flex;

  gap:15px;

  align-items:center;

  flex-wrap:wrap;

}


.nav a{

  text-decoration:none;

  color:#111827;

  font-weight:600;

}


.logout-btn{

  background:#ef4444;

  color:white;

  border:none;

  padding:10px 16px;

  border-radius:10px;

  cursor:pointer;

  font-weight:600;

}


.dashboard-title{

  margin-top:30px;

  font-size:38px;

  font-weight:700;

  color:#111827;

}


.stats-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-top:30px;

}


.stat-card{

  background:white;

  padding:25px;

  border-radius:20px;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);

}


.stat-card h3{

  margin:0;

  color:#6b7280;

}


.stat-card p{

  margin-top:15px;

  font-size:32px;

  font-weight:700;

}


.section-card{

  background:white;

  padding:30px;

  border-radius:24px;

  margin-top:40px;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);

}


.section-title{

  font-size:28px;

  font-weight:700;

  margin-bottom:25px;

}


.form-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:20px;

}


.form-group{

  margin-bottom:20px;

}


.form-group label{

  display:block;

  margin-bottom:8px;

  font-weight:600;

}


.form-group input,
.form-group textarea,
.form-group select{

  width:100%;

  padding:14px;

  border:1px solid #d1d5db;

  border-radius:12px;

  font-size:15px;

  outline:none;

}


.form-group textarea{

  resize:none;

  height:120px;

}


.add-btn{

  background:#10b981;

  color:white;

  border:none;

  padding:15px 24px;

  border-radius:12px;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

}


.products-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(260px,1fr));

  gap:25px;

}


.product-card{

  background:white;

  border-radius:18px;

  overflow:hidden;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);

}


.product-image{

  width:100%;

  height:220px;

  object-fit:cover;

}


.product-content{

  padding:20px;

}


.product-title{

  font-size:20px;

  font-weight:700;

  margin-bottom:10px;

}


.product-price{

  color:#0ea5e9;

  font-size:22px;

  font-weight:700;

  margin-bottom:15px;

}


.delete-btn{

  width:100%;

  background:#ef4444;

  color:white;

  border:none;

  padding:12px;

  border-radius:10px;

  cursor:pointer;

  font-weight:600;

}


.order-card{

  background:#f9fafb;

  border-radius:18px;

  padding:20px;

  margin-bottom:20px;

}


.order-status{

  padding:10px;

  border-radius:10px;

  border:1px solid #d1d5db;

  margin-top:10px;

}


.loading{

  text-align:center;

  padding:40px;

}


@media(max-width:768px){

  .form-grid{

    grid-template-columns:1fr;

  }

}

</style>

</head>

<body>

<div class="dashboard">

<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase Seller
    </h1>

    <div
      style="font-size:13px;color:#6b7280"
    >
      Seller Dashboard
    </div>

  </div>

  <nav class="nav">

    <a href="index.html">
      Home
    </a>

    <a href="orders.html">
      Orders
    </a>

    <a href="profile.html">
      Profile
    </a>

    <button
      id="logoutBtn"
      class="logout-btn"
    >
      Logout
    </button>

  </nav>

</header>

<h1 class="dashboard-title">
  Seller Dashboard
</h1>

<div class="stats-grid">

  <div class="stat-card">

    <h3>
      Total Products
    </h3>

    <p id="totalProducts">
      0
    </p>

  </div>

  <div class="stat-card">

    <h3>
      Total Orders
    </h3>

    <p id="totalOrders">
      0
    </p>

  </div>

</div>

<div class="section-card">

  <div class="section-title">
    Add Product
  </div>

  <form id="productForm">

    <div class="form-grid">

      <div class="form-group">

        <label>
          Product Title
        </label>

        <input
          type="text"
          id="title"
          required
        >

      </div>

      <div class="form-group">

        <label>
          Product Price
        </label>

        <input
          type="number"
          id="price"
          required
        >

      </div>

      <div class="form-group">

        <label>
          Product Category
        </label>

        <input
          type="text"
          id="category"
          required
        >

      </div>

      <div class="form-group">

        <label>
          Upload Image
        </label>

        <input
          type="file"
          id="imageFile"
          accept="image/*"
          required
        >

      </div>

    </div>

    <div class="form-group">

      <label>
        Description
      </label>

      <textarea
        id="description"
      ></textarea>

    </div>

    <button
      type="submit"
      class="add-btn"
    >
      Add Product
    </button>

  </form>

</div>

<div class="section-card">

  <div class="section-title">
    My Products
  </div>

  <div
    class="products-grid"
    id="productsGrid"
  >

    <div class="loading">
      Loading products...
    </div>

  </div>

</div>

<div class="section-card">

  <div class="section-title">
    Customer Orders
  </div>

  <div id="sellerOrders">

    <div class="loading">
      Loading orders...
    </div>

  </div>

</div>

</div>

<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




// LOGIN CHECK
if(!user){

  window.location.href =
    'login.html';

}










// GET PROFILE
const {
  data: profile
} = await supabase
  .from('profiles')
  .select('*')
  .eq('id', user.id)
  .single();




// ROLE CHECK
if(profile.role !== 'seller'){

  alert('Seller access only');

  window.location.href =
    'index.html';

}










// LOAD PRODUCTS
async function loadProducts(){

  const {
    data,
    error
  } = await supabase
    .from('products')
    .select('*')
    .eq('seller_id', user.id);




  if(error){

    console.log(error);

    return;

  }






  document.getElementById(
    'totalProducts'
  ).innerText = data.length;






  const grid =
    document.getElementById(
      'productsGrid'
    );




  grid.innerHTML = '';






  if(data.length === 0){

    grid.innerHTML = `

      <div class="loading">

        No products added yet

      </div>

    `;

    return;

  }






  data.forEach(product => {

    grid.innerHTML += `

      <div class="product-card">

        <img
          src="${product.image}"
          class="product-image"
        >

        <div class="product-content">

          <div class="product-title">

            ${product.title}

          </div>

          <div class="product-price">

            ₹${product.price}

          </div>

          <button
            class="delete-btn"
            onclick="deleteProduct('${product.id}')"
          >

            Delete Product

          </button>

        </div>

      </div>

    `;

  });

}


loadProducts();










// ADD PRODUCT
document
.getElementById('productForm')
.addEventListener('submit',

async (e)=>{

  e.preventDefault();




  const file =
    document.getElementById(
      'imageFile'
    ).files[0];




  if(!file){

    alert('Select image');

    return;

  }






  const fileName =

    `${Date.now()}-${file.name}`;








  // UPLOAD IMAGE
  const {
    error: uploadError
  } = await supabase.storage
    .from('product-images')
    .upload(fileName, file);




  if(uploadError){

    alert(uploadError.message);

    return;

  }








  // GET PUBLIC URL
  const {
    data: imageData
  } = supabase.storage
    .from('product-images')
    .getPublicUrl(fileName);




  const imageUrl =
    imageData.publicUrl;








  // PRODUCT OBJECT
  const product = {

    title:
      document.getElementById(
        'title'
      ).value,




    price:Number(

      document.getElementById(
        'price'
      ).value

    ),




    category:
      document.getElementById(
        'category'
      ).value,




    description:
      document.getElementById(
        'description'
      ).value,




    image:imageUrl,




    seller_id:user.id

  };








  // INSERT PRODUCT
  const {
    error
  } = await supabase
    .from('products')
    .insert([product]);




  if(error){

    console.log(error);

    alert(error.message);

    return;

  }








  alert(
    'Product added successfully'
  );




  document
    .getElementById(
      'productForm'
    )
    .reset();




  loadProducts();

});










// DELETE PRODUCT
window.deleteProduct =
async function(id){

  const confirmDelete =
    confirm(
      'Delete this product?'
    );




  if(!confirmDelete) return;




  await supabase
    .from('products')
    .delete()
    .eq('id', id);




  loadProducts();

};










// LOAD SELLER ORDERS
async function loadSellerOrders(){

  const {
    data: orders
  } = await supabase
    .from('orders')
    .select('*')
    .eq('seller_id', user.id)
    .order('created_at', {

      ascending:false

    });






  document.getElementById(
    'totalOrders'
  ).innerText = orders.length;






  const container =
    document.getElementById(
      'sellerOrders'
    );




  container.innerHTML = '';






  if(orders.length === 0){

    container.innerHTML = `

      <div class="loading">

        No customer orders yet

      </div>

    `;

    return;

  }






  orders.forEach(order => {

    container.innerHTML += `

      <div class="order-card">

        <img
          src="${order.product_image}"
          class="product-image"
        >

        <div class="product-content">

          <h3>

            ${order.product_title}

          </h3>










          <p>

            Customer:
            ${order.customer_name}

          </p>










          <p>

            Email:
            ${order.customer_email}

          </p>










          <p>

            Phone:
            ${order.customer_phone}

          </p>










          <p>

            Address:
            ${order.customer_address}

          </p>










          <p>

            Quantity:
            ${order.quantity}

          </p>










          <p>

            Total:
            ₹${order.total}

          </p>










          <select
            class="order-status"

            onchange="
              updateStatus(
                '${order.id}',
                this.value
              )
            "
          >

            <option>
              ${order.status}
            </option>

            <option>
              Pending
            </option>

            <option>
              Packed
            </option>

            <option>
              Shipped
            </option>

            <option>
              Out For Delivery
            </option>

            <option>
              Delivered
            </option>

          </select>

        </div>

      </div>

    `;

  });

}


loadSellerOrders();










// UPDATE STATUS
window.updateStatus =
async function(id, status){

  let tracking = '';






  if(status === 'Pending'){

    tracking =
    'Order placed successfully';

  }

  if(status === 'Packed'){

    tracking =
    'Seller packed your order';

  }

  if(status === 'Shipped'){

    tracking =
    'Order shipped';

  }

  if(status === 'Out For Delivery'){

    tracking =
    'Delivery partner is arriving';

  }

  if(status === 'Delivered'){

    tracking =
    'Order delivered successfully';

  }






  await supabase
  .from('orders')
  .update({

    status:status,

    tracking_message:tracking

  })
  .eq('id', id);




  loadSellerOrders();

};










// REALTIME PRODUCTS
supabase
.channel('seller-products')

.on(

  'postgres_changes',

  {

    event:'*',

    schema:'public',

    table:'products'

  },

  ()=>{

    loadProducts();

  }

)

.subscribe();










// REALTIME ORDERS
supabase
.channel('seller-orders')

.on(

  'postgres_changes',

  {

    event:'*',

    schema:'public',

    table:'orders'

  },

  ()=>{

    loadSellerOrders();

  }

)

.subscribe();










// LOGOUT
document
.getElementById('logoutBtn')
.addEventListener('click',

async ()=>{

  await supabase.auth.signOut();




  window.location.href =
    'login.html';

});

</script>

</body>
</html>
