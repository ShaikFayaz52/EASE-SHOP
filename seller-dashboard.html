
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Seller Dashboard | ShopEase</title>


  <link
    rel="stylesheet"
    href="styles.css"
  >


  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >



<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.dashboard{

  max-width:1300px;

  margin:auto;

  padding:20px;

}


.dashboard-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:30px;

  flex-wrap:wrap;

}


.dashboard-title{

  font-size:38px;

  font-weight:700;

  color:#111827;

}


.stats-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-bottom:35px;

}


.stat-card{

  background:white;

  padding:25px;

  border-radius:24px;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.stat-card h3{

  margin:0;

  color:#6b7280;

  font-size:16px;

}


.stat-card p{

  margin-top:15px;

  font-size:34px;

  font-weight:700;

  color:#111827;

}


.add-product-card{

  background:white;

  padding:30px;

  border-radius:24px;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

  margin-bottom:35px;

}


.section-title{

  font-size:28px;

  font-weight:700;

  margin-bottom:25px;

  color:#111827;

}


.form-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:20px;

}


.form-group{

  margin-bottom:20px;

}


.form-group label{

  display:block;

  margin-bottom:8px;

  font-weight:600;

  color:#374151;

}


.form-group input,
.form-group textarea{

  width:100%;

  padding:14px;

  border:1px solid #d1d5db;

  border-radius:14px;

  font-size:15px;

  outline:none;

}


.form-group textarea{

  resize:none;

  height:120px;

}


.add-btn{

  background:#10b981;

  color:white;

  border:none;

  padding:15px 24px;

  border-radius:14px;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

}


.products-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(260px,1fr));

  gap:25px;

}


.product-card{

  background:white;

  border-radius:24px;

  overflow:hidden;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.product-card img{

  width:100%;

  height:220px;

  object-fit:cover;

}


.product-content{

  padding:20px;

}


.product-title{

  font-size:20px;

  font-weight:700;

  margin-bottom:10px;

}


.product-price{

  color:#0ea5e9;

  font-size:22px;

  font-weight:700;

  margin-bottom:15px;

}


.delete-btn{

  width:100%;

  background:#ef4444;

  color:white;

  border:none;

  padding:12px;

  border-radius:12px;

  cursor:pointer;

  font-weight:700;

}


@media(max-width:768px){

  .form-grid{

    grid-template-columns:1fr;

  }

}

</style>

</head>

<body>





<div class="dashboard">





<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase Seller
    </h1>

    <div
      class="muted"
      style="font-size:13px"
    >
      Seller Dashboard
    </div>

  </div>



  <nav class="nav">

    <a href="index.html">
      Store
    </a>

    <a href="orders.html">
      Orders
    </a>

    <a href="profile.html">
      Profile
    </a>

  </nav>

</header>








<div class="dashboard-header">

  <div class="dashboard-title">

    Seller Dashboard

  </div>

</div>








<div class="stats-grid">

  <div class="stat-card">

    <h3>
      Total Products
    </h3>

    <p id="totalProducts">
      0
    </p>

  </div>





  <div class="stat-card">

    <h3>
      Total Orders
    </h3>

    <p id="totalOrders">
      0
    </p>

  </div>





  <div class="stat-card">

    <h3>
      Revenue
    </h3>

    <p id="revenue">
      ₹0
    </p>

  </div>

</div>








<div class="add-product-card">

  <div class="section-title">

    Add Product

  </div>






  <form id="productForm">

    <div class="form-grid">





      <div class="form-group">

        <label>
          Product Title
        </label>

        <input
          type="text"
          id="title"
          required
        >

      </div>






      <div class="form-group">

        <label>
          Price
        </label>

        <input
          type="number"
          id="price"
          required
        >

      </div>






      <div class="form-group">

        <label>
          Upload product Image 
        </label>

        <input
          type="file"
          id="imageFile"
          accept="image/*"
          required
        >

      </div>






      <div class="form-group">

        <label>
          Category
        </label>

        <input
          type="text"
          id="category"
          required
        >

      </div>

    </div>






    <div class="form-group">

      <label>
        Description
      </label>

      <textarea
        id="description"
      ></textarea>

    </div>






    <button
      type="submit"
      class="add-btn"
    >

      Add Product

    </button>

  </form>

</div>









<div class="section-title">

  My Products

</div>






<div
  class="products-grid"
  id="productsGrid"
>

</div>

</div>









<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




// CHECK LOGIN
if(!user){

  window.location.href =
    'login.html';

}




// CHECK ROLE
const {
  data: profile
} = await supabase
  .from('profiles')
  .select('*')
  .eq('id', user.id)
  .single();




if(profile.role !== 'seller'){

  alert('Seller access only');

  window.location.href =
    'index.html';

}








// LOAD PRODUCTS
async function loadProducts(){

  const {
    data,
    error
  } = await supabase
    .from('products')
    .select('*')
    .eq('seller_id', user.id);




  if(error){

    console.log(error);

    return;

  }




  document.getElementById(
    'totalProducts'
  ).innerText = data.length;




  const grid =
    document.getElementById(
      'productsGrid'
    );




  grid.innerHTML = '';




  data.forEach(product => {

    grid.innerHTML += `

      <div class="product-card">

        <img src="${product.image}">




        <div class="product-content">

          <div class="product-title">

            ${product.title}

          </div>




          <div class="product-price">

            ₹${product.price}

          </div>




          <button
            class="delete-btn"
            onclick="deleteProduct('${product.id}')"
          >

            Delete Product

          </button>

        </div>

      </div>

    `;

  });

}


loadProducts();









// ADD PRODUCT
  // PRODUCT OBJECT
  const product = {

    title:
      document.getElementById(
        'title'
      ).value,




    price:
      document.getElementById(
        'price'
      ).value,




    category:
      document.getElementById(
        'category'
      ).value,




    description:
      document.getElementById(
        'description'
      ).value,




    image: imageUrl,




    seller_id: user.id

  };




  // INSERT PRODUCT
  const {
    error
  } = await supabase
    .from('products')
    .insert([product]);




  if(error){

    alert(error.message);

    return;

  }




  alert('Product added successfully');




  document
    .getElementById('productForm')
    .reset();




  loadProducts();

});










// DELETE PRODUCT
window.deleteProduct =
async function(id){

  const confirmDelete =
    confirm(
      'Delete this product?'
    );




  if(!confirmDelete) return;




  const {
    error
  } = await supabase
    .from('products')
    .delete()
    .eq('id', id);




  if(error){

    alert(error.message);

    return;

  }




  loadProducts();

};

</script>


</body>
</html>
