
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Checkout | ShopEase</title>

  <link
    rel="stylesheet"
    href="styles.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >



<style>

body{

  margin:0;

  padding:0;

  font-family:'Poppins',sans-serif;

  background:#f4f7fb;

}


.checkout-page{

  max-width:900px;

  margin:40px auto;

  padding:20px;

}


.checkout-card{

  background:white;

  border-radius:18px;

  padding:30px;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


.checkout-title{

  font-size:32px;

  font-weight:700;

  margin-bottom:10px;

  color:#111827;

}


.checkout-subtitle{

  color:#6b7280;

  margin-bottom:30px;

}


.form-group{

  margin-bottom:20px;

}


.form-group label{

  display:block;

  margin-bottom:8px;

  font-weight:600;

  color:#374151;

}


.form-group input,

.form-group textarea,

.form-group select{

  width:100%;

  padding:14px;

  border:1px solid #d1d5db;

  border-radius:12px;

  font-size:15px;

  outline:none;

}


.form-group textarea{

  resize:none;

  height:100px;

}


.order-summary{

  background:#f9fafb;

  padding:20px;

  border-radius:14px;

  margin-top:25px;

}


.summary-item{

  display:flex;

  justify-content:space-between;

  margin-bottom:12px;

}


.total-row{

  display:flex;

  justify-content:space-between;

  margin-top:20px;

  font-size:22px;

  font-weight:700;

}


.place-order-btn{

  width:100%;

  margin-top:30px;

  background:#10b981;

  color:white;

  border:none;

  padding:16px;

  border-radius:14px;

  font-size:18px;

  font-weight:700;

  cursor:pointer;

}


.place-order-btn:hover{

  opacity:0.9;

}


.empty-cart{

  text-align:center;

  padding:60px;

}


.empty-cart a{

  text-decoration:none;

  background:#0ea5e9;

  color:white;

  padding:12px 20px;

  border-radius:10px;

  display:inline-block;

  margin-top:20px;

}


@media(max-width:768px){

  .checkout-card{

    padding:20px;

  }

}

</style>

</head>

<body>



<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase
    </h1>

    <div
      class="muted"
      style="font-size:13px"
    >
      Secure Checkout
    </div>

  </div>


  <nav class="nav">

    <a href="index.html">
      Home
    </a>

    <a href="products.html">
      Products
    </a>

    <a href="orders.html">
      Orders
    </a>

    <a href="cart.html">
      Cart
      (
      <span id="cart-count">
        0
      </span>
      )
    </a>

    <a href="profile.html">
      Profile
    </a>

  </nav>

</header>





<div class="checkout-page">

  <div
    class="checkout-card"
    id="checkoutContainer"
  >

  </div>

</div>





<script type="module">

import { supabase }
from './supabase.js';




// GET CART
function getCart(){

  return JSON.parse(
    localStorage.getItem('cart') || '[]'
  );

}



// UPDATE CART COUNT
function updateCartCount(){

  const cart = getCart();

  const totalQty =
    cart.reduce((s,i)=>s+i.qty,0);

  document.getElementById('cart-count')
  .innerText = totalQty;

}


updateCartCount();




// RENDER CHECKOUT
async function renderCheckout(){

  const cart = getCart();

  const container =
    document.getElementById(
      'checkoutContainer'
    );



  // EMPTY CART
  if(cart.length === 0){

    container.innerHTML = `

      <div class="empty-cart">

        <h2>
          Your cart is empty
        </h2>

        <p>
          Add products before checkout
        </p>

        <a href="products.html">
          Shop Products
        </a>

      </div>

    `;

    return;

  }




  // TOTAL
  const total =
    cart.reduce((s,i)=>{

      return s + (i.price * i.qty);

    },0);




  // SHOW FORM
  container.innerHTML = `

    <div class="checkout-title">
      Checkout
    </div>

    <div class="checkout-subtitle">
      Complete your order details
    </div>



    <form id="checkoutForm">

      <div class="form-group">

        <label>
          Full Name
        </label>

        <input
          type="text"
          id="name"
          required
        >

      </div>



      <div class="form-group">

        <label>
          Phone Number
        </label>

        <input
          type="text"
          id="phone"
          required
        >

      </div>



      <div class="form-group">

        <label>
          Delivery Address
        </label>

        <textarea
          id="address"
          required
        ></textarea>

      </div>



      <div class="form-group">

        <label>
          Payment Method
        </label>

        <select id="payment">

          <option value="COD">
            Cash On Delivery
          </option>

          <option value="UPI">
            UPI
          </option>

          <option value="CARD">
            Debit / Credit Card
          </option>

        </select>

      </div>




      <div class="order-summary">

        <h3>
          Order Summary
        </h3>


        ${cart.map(item => `

          <div class="summary-item">

            <span>
              ${item.title}
              ×
              ${item.qty}
            </span>

            <span>
              ₹${item.price * item.qty}
            </span>

          </div>

        `).join('')}




        <div class="total-row">

          <span>
            Total
          </span>

          <span>
            ₹${total}
          </span>

        </div>

      </div>




      <button
        type="submit"
        class="place-order-btn"
      >
        Place Order
      </button>

    </form>

  `;





  // SUBMIT ORDER
  document
  .getElementById('checkoutForm')
  .addEventListener('submit',

    async (e)=>{

      e.preventDefault();




      // USER
      const {
        data: { user }
      } = await supabase.auth.getUser();




      if(!user){

        alert('Please login first');

        window.location.href =
          'login.html';

        return;

      }




      // ORDER DATA
      const orderData = {

        user_id: user.id,

        items: cart,

        total: total,

        customer_name:
          document.getElementById('name').value,

        phone:
          document.getElementById('phone').value,

        address:
          document.getElementById('address').value,

        payment_method:
          document.getElementById('payment').value,

        status: 'Pending'

      };




      // SAVE ORDER
      const {
        error
      } = await supabase
        .from('orders')
        .insert([orderData]);




      if(error){

        alert(error.message);

        return;

      }




      // CLEAR CART
      localStorage.removeItem('cart');




      // SUCCESS
      alert('Order placed successfully');




      window.location.href =
        'success.html';

  });

}


renderCheckout();

</script>


</body>
</html>
