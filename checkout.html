
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Checkout | ShopEase</title>

  <link
    rel="stylesheet"
    href="styles.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

<style>

body{

  margin:0;

  padding:0;

  background:#f4f7fb;

  font-family:'Poppins',sans-serif;

}


.checkout-page{

  max-width:1200px;

  margin:auto;

  padding:20px;

}


.site-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  flex-wrap:wrap;

  gap:20px;

}


.logo{

  margin:0;

}


.nav{

  display:flex;

  gap:15px;

  align-items:center;

  flex-wrap:wrap;

}


.nav a{

  text-decoration:none;

  color:#111827;

  font-weight:600;

}


.checkout-container{

  display:grid;

  grid-template-columns:1fr 400px;

  gap:30px;

  margin-top:40px;

}


.checkout-form{

  background:white;

  padding:30px;

  border-radius:24px;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);

}


.section-title{

  font-size:28px;

  font-weight:700;

  margin-bottom:25px;

}


.form-group{

  margin-bottom:20px;

}


.form-group label{

  display:block;

  margin-bottom:8px;

  font-weight:600;

}


.form-group input,
.form-group textarea,
.form-group select{

  width:100%;

  padding:14px;

  border:1px solid #d1d5db;

  border-radius:12px;

  font-size:15px;

  outline:none;

}


.form-group textarea{

  resize:none;

  height:100px;

}


.place-order-btn{

  width:100%;

  background:#10b981;

  color:white;

  border:none;

  padding:16px;

  border-radius:14px;

  font-size:17px;

  font-weight:700;

  cursor:pointer;

}


.place-order-btn:hover{

  opacity:0.9;

}


.order-summary{

  background:white;

  padding:30px;

  border-radius:24px;

  height:fit-content;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);

}


.summary-item{

  display:flex;

  justify-content:space-between;

  margin-bottom:15px;

}


.cart-item{

  display:flex;

  gap:15px;

  margin-bottom:20px;

  border-bottom:1px solid #e5e7eb;

  padding-bottom:15px;

}


.cart-image{

  width:80px;

  height:80px;

  object-fit:cover;

  border-radius:12px;

}


.total{

  font-size:24px;

  font-weight:700;

  margin-top:20px;

}


@media(max-width:900px){

  .checkout-container{

    grid-template-columns:1fr;

  }

}

</style>

</head>

<body>

<div class="checkout-page">

<header class="site-header">

  <div>

    <h1 class="logo">
      ShopEase
    </h1>

    <div
      style="font-size:13px;color:#6b7280"
    >
      Secure Checkout
    </div>

  </div>

  <nav class="nav">

    <a href="index.html">
      Home
    </a>

    <a href="products.html">
      Products
    </a>

    <a href="orders.html">
      Orders
    </a>

    <a href="cart.html">
      Cart
    </a>

  </nav>

</header>

<div class="checkout-container">

<div class="checkout-form">

  <div class="section-title">
    Delivery Details
  </div>

  <form id="checkoutForm">

    <div class="form-group">

      <label>
        Full Name
      </label>

      <input
        type="text"
        id="name"
        required
      >

    </div>

    <div class="form-group">

      <label>
        Email Address
      </label>

      <input
        type="email"
        id="email"
        required
      >

    </div>

    <div class="form-group">

      <label>
        Phone Number
      </label>

      <input
        type="tel"
        id="phone"
        required
      >

    </div>

    <div class="form-group">

      <label>
        Delivery Address
      </label>

      <textarea
        id="address"
        required
      ></textarea>

    </div>

    <div class="form-group">

      <label>
        Payment Method
      </label>

      <select id="payment">

        <option value="Cash On Delivery">
          Cash On Delivery
        </option>

        <option value="UPI">
          UPI
        </option>

        <option value="Card">
          Credit / Debit Card
        </option>

      </select>

    </div>

    <button
      type="submit"
      class="place-order-btn"
    >
      Place Order
    </button>

  </form>

</div>

<div class="order-summary">

  <div class="section-title">
    Order Summary
  </div>

  <div id="cartItems">

  </div>

  <div class="total">

    Total:
    ₹<span id="grandTotal">
      0
    </span>

  </div>

</div>

</div>

</div>

<script type="module">

import { supabase }
from './supabase.js';




// GET USER
const {
  data:{ user }
} = await supabase.auth.getUser();




// LOGIN CHECK
if(!user){

  window.location.href =
    'login.html';

}










// LOAD CART
const cart =
JSON.parse(
  localStorage.getItem('cart') || '[]'
);




// EMPTY CART
if(cart.length === 0){

  alert('Cart is empty');

  window.location.href =
    'cart.html';

}










// DISPLAY CART
const cartContainer =
document.getElementById(
  'cartItems'
);

let grandTotal = 0;

cart.forEach(item => {

  const total =
    item.price * item.qty;

  grandTotal += total;

  cartContainer.innerHTML += `

    <div class="cart-item">

      <img
        src="${item.image}"
        class="cart-image"
      >

      <div>

        <h3>
          ${item.title}
        </h3>

        <p>
          Quantity:
          ${item.qty}
        </p>

        <p>
          ₹${total}
        </p>

      </div>

    </div>

  `;

});

document.getElementById(
  'grandTotal'
).innerText = grandTotal;










// PLACE ORDER
document
.getElementById('checkoutForm')
.addEventListener('submit',

async (e)=>{

  e.preventDefault();




  const name =
    document.getElementById(
      'name'
    ).value;

  const email =
    document.getElementById(
      'email'
    ).value;

  const phone =
    document.getElementById(
      'phone'
    ).value;

  const address =
    document.getElementById(
      'address'
    ).value;

  const payment =
    document.getElementById(
      'payment'
    ).value;










  // SAVE ORDERS
  for(const item of cart){

    const order = {

      customer_id:user.id,

      seller_id:item.seller_id || null,

      customer_name:name,

      customer_email:email,

      customer_phone:phone,

      customer_address:address,

      payment_method:payment,

      product_title:item.title,

      product_image:item.image,

      quantity:item.qty,

      total:item.price * item.qty,

      status:'Pending',

      tracking_message:
      'Order placed successfully'

    };








    const {
      error
    } = await supabase
      .from('orders')
      .insert([order]);




    if(error){

      console.log(error);

      alert(error.message);

      return;

    }

  }










  // CLEAR CART
  localStorage.removeItem('cart');










  // SUCCESS
  alert(
    'Order placed successfully'
  );




  window.location.href =
    'success.html';

});

</script>

</body>
</html>
